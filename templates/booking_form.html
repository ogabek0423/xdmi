{% extends 'base.html' %}

{% block content %}
<h2 class="mb-4">Create Booking</h2>

<form method="post" class="card p-4 shadow">
    {% csrf_token %}
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Submit</button>
</form>
{% endblock %}
